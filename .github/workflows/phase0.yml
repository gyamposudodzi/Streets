name: Phase 0 Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify scaffold structure
        run: node scripts/check-structure.mjs

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile backend package
        run: python -m compileall backend/app
